<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio | Artes da Nicoli</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Fira Code', monospace;}
body{background:#1a1a22;color:#f2f2f2;min-height:100vh;padding:40px;position: relative;scroll-behavior:smooth;}
#particles{position:fixed;width:100%;height:100%;top:0;left:0;z-index:-1;pointer-events:none;}
.titulo{text-align:center;font-size:32px;margin-bottom:20px;color:#cdb4ff;}
.subtitulo{ text-align: center; margin-bottom: 30px; height: 24px; overflow: hidden; white-space: nowrap; }
.filtros{text-align:center;margin-bottom:30px;}
.filtros button{padding:8px 15px;margin:0 5px;border:1px solid #cdb4ff;border-radius:5px;background:transparent;color:#cdb4ff;cursor:pointer;transition:0.3s;}
.filtros button:hover{background:#cdb4ff;color:#1a1a22;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:25px;max-width:1000px;margin:auto;}
.card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:15px;overflow:hidden;backdrop-filter:blur(20px);opacity:0;transform:translateY(40px);position:relative;transition:transform 0.5s ease, opacity 0.5s ease;}
.card.show{opacity:1;transform:translateY(0);}
.card:hover{transform:translateY(-10px) scale(1.03);box-shadow:0 0 15px #cdb4ff;}
.card img{width:100%;height:220px;object-fit:cover;cursor:pointer;display:block;}
.card h3{padding:15px;font-size:16px;}
.voltar{display:block;width:200px;text-align:center;margin:50px auto 0;padding:12px;border-radius:8px;border:1px solid #cdb4ff;color:#cdb4ff;text-decoration:none;transition:0.3s;cursor:pointer;}
.voltar:hover{background:#cdb4ff;color:#1a1a22;box-shadow:0 0 12px #cdb4ff;}
.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;justify-content:center;align-items:center;flex-direction:column;opacity:0;pointer-events:none;transition:0.4s; padding:20px;text-align:center;}
.lightbox.show{opacity:1;pointer-events:auto;}
.lightbox img{max-width:90%;max-height:60%;border-radius:10px;margin-bottom:15px;transition: opacity 0.5s ease-in-out; opacity:1;}
.lightbox img.fade-out{opacity:0;}
.lightbox h3{color:#cdb4ff;margin-bottom:10px;}
.loader{border:4px solid rgba(255,255,255,0.2);border-top:4px solid #cdb4ff;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;}
@keyframes spin{0%{transform:translate(-50%,-50%) rotate(0deg);}100%{transform:translate(-50%,-50%) rotate(360deg);}}
.fechar{position:absolute;top:25px;left:25px;padding:10px 18px;border-radius:8px;border:1px solid #cdb4ff;background:transparent;color:#cdb4ff;cursor:pointer;transition:0.3s;z-index:100;}
.fechar:hover{background:#cdb4ff;color:#1a1a22;}
.seta{position:absolute;top:50%;transform:translateY(-50%);font-size:40px;color:#cdb4ff;cursor:pointer;user-select:none;transition:0.3s;}
.seta:hover{transform:translateY(-50%) scale(1.1);}
.esquerda{left:20px;}
.direita{right:20px;}
#painel,#loginPainel{max-width:500px;margin:40px auto;padding:20px;background:rgba(255,255,255,0.1);border-radius:10px;transition:opacity 0.5s ease;}
#painel h3,#loginPainel h3{margin-bottom:10px;color:#cdb4ff;text-align:center;}
#painel input,#painel select,#loginPainel input{width:100%;padding:8px;margin-bottom:10px;border-radius:5px;border:1px solid #cdb4ff;background:transparent;color:#f2f2f2;}
#painel button,#loginPainel button{padding:10px 15px;border:none;border-radius:5px;background:#cdb4ff;color:#1a1a22;cursor:pointer;transition:0.3s;width:100%;}
#painel button:hover,#loginPainel button:hover{background:#ff9ecf;}
@media(max-width:768px){.grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}.lightbox img{max-width:90%;max-height:70%;}}
@media(max-width:480px){.grid{grid-template-columns:1fr;gap:15px;}.lightbox img{max-width:95%;max-height:60%;}.seta{font-size:30px;}}
@media(prefers-color-scheme: light){
body{background:#fff0f6;color:#c2185b;}
.titulo{color:#ff6fb5;}
.card{background:rgba(255,255,255,0.9);border:1px solid #ffc1e3;}
.card:hover{box-shadow:0 0 15px #ff9ecf;}
.filtros button{border:1px solid #ff9ecf;color:#c2185b;}
.filtros button:hover{background:#ff9ecf;color:white;}
.voltar{border:1px solid #ff9ecf;color:#c2185b;}
.voltar:hover{background:#ff9ecf;color:white;box-shadow:0 0 12px #ff9ecf;}
.fechar{border:1px solid #ff9ecf;color:#c2185b;}
.fechar:hover{background:#ff9ecf;color:white;box-shadow:0 0 10px #ff9ecf;}
.seta{color:#ff9ecf;}
#painel input,#painel select{border:1px solid #ff9ecf;color:#c2185b;background:#fff0f6;}
#loginPainel input{border:1px solid #ff9ecf;color:#c2185b;background:#fff0f6;}
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<h1 class="titulo">Meu Portfólio 🎨</h1>
<p class="subtitulo"></p>

<div class="filtros"></div>
<div class="grid" id="grid"></div>

<div class="lightbox" id="lightbox">
  <button class="fechar" id="fecharZoom">⬅ Voltar</button>
  <div class="seta esquerda" id="prev">❮</div>
  <div class="seta direita" id="next">❯</div>
  <h3 id="lightbox-titulo"></h3>
  <img id="lightbox-img">
  <div class="loader" id="lightbox-loader"></div>
</div>

<!-- Login para acessar o painel -->
<div id="loginPainel">
  <input type="password" id="senha" placeholder="Digite a senha">
  <button id="entrar">Entrar</button>
</div>

<!-- Painel protegido -->
<div id="painel" style="display:none;">
  <h3>Adicionar Nova Arte</h3>
  <input type="text" id="tituloArte" placeholder="Título da Arte">
  <input type="text" id="categoriaArte" placeholder="Categoria (ex: anime)">
  <input type="file" id="fileImagem" accept="image/*">
  <button id="adicionarArte">Adicionar Arte</button>
</div>

<script>
/* ====================== partículas ====================== */
const canvas=document.getElementById("particles"),ctx=canvas.getContext("2d");
function ajustarCanvas(){canvas.width=document.body.scrollWidth;canvas.height=document.body.scrollHeight;}
ajustarCanvas();window.addEventListener("resize",ajustarCanvas);
let particles=[],cores=["#fff5e6","#fff1cc","#ffe0b3"];
for(let i=0;i<80;i++) particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,cor:cores[Math.floor(Math.random()*cores.length)],vel:Math.random()*0.3+0.1});
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{let grad=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);grad.addColorStop(0,p.cor+"aa");grad.addColorStop(1,p.cor+"00");ctx.beginPath();ctx.arc(p.x,p.y,p.r*4,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();p.y+=p.vel;if(p.y>canvas.height)p.y=0;});requestAnimationFrame(draw);}
draw();

/* ====================== digitação ====================== */
const subtitulo=document.querySelector(".subtitulo");
let frases=["Arte que inspira","Criatividade sem limites","Bem-vindo ao meu mundo"];
let i=0,j=0,mostrar=true;
function digitar(){subtitulo.innerText=frases[i].slice(0,j);if(mostrar) j++; else j--; if(j>frases[i].length) mostrar=false; if(j===0){mostrar=true;i=(i+1)%frases.length;} setTimeout(digitar,100);}
digitar();

/* ====================== dados iniciais ====================== */
let artes=JSON.parse(localStorage.getItem("artes"))||[
  {titulo:"Desingn Anime",categoria:"anime",imagem:"arte1.jpg"},
  {titulo:"Realismo",categoria:"realismo",imagem:"arte2.jpg"},
  {titulo:"Desenho Criativo",categoria:"criativo",imagem:"arte3.jpg"}
];

/* ====================== renderizar artes ====================== */
function renderizarArtes(){
  const grid=document.getElementById("grid");
  const filtroDiv=document.querySelector(".filtros");
  grid.innerHTML="";
  const categorias=["todos",...new Set(artes.map(a=>a.categoria))];
  filtroDiv.innerHTML=categorias.map(c=>`<button data-categoria="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</button>`).join("");
  artes.forEach(a=>{
    const card=document.createElement("div");
    card.className="card";
    card.dataset.categoria=a.categoria;
    card.innerHTML=`<img data-src="${a.imagem}" alt="${a.titulo}"><h3>${a.titulo}</h3>`;
    grid.appendChild(card);
  });
  iniciarInteracoes();
  lazyLoadImages();
}
renderizarArtes();

/* ====================== lazy load ====================== */
function lazyLoadImages(){
  const imgs=document.querySelectorAll(".card img");
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const img=entry.target;
        img.src=img.dataset.src;
        observer.unobserve(img);
      }
    });
  });
  imgs.forEach(img=>{
    img.src="";
    observer.observe(img);
  });
}

/* ====================== login para acessar o painel ====================== */
const senhaCorreta = "nicart3392"; // senha alterada
document.getElementById("entrar").addEventListener("click", () => {
  const valor = document.getElementById("senha").value;
  if(valor === senhaCorreta){
    document.getElementById("loginPainel").style.display = "none";
    const painel=document.getElementById("painel");
    painel.style.display = "block";
    painel.style.opacity = 0;
    setTimeout(()=>{painel.style.opacity = 1;},50);
  } else {
    alert("Senha incorreta!");
  }
});

/* ====================== adicionar nova arte ====================== */
document.getElementById("adicionarArte").addEventListener("click",()=>{
  const titulo=document.getElementById("tituloArte").value;
  const categoria=document.getElementById("categoriaArte").value;
  const fileInput=document.getElementById("fileImagem");
  if(titulo && categoria && fileInput.files.length>0){
    const file=fileInput.files[0];
    const reader=new FileReader();
    reader.onload=function(e){
      const imagemData=e.target.result;
      artes.push({titulo:titulo,categoria:categoria,imagem:imagemData});
      localStorage.setItem("artes",JSON.stringify(artes));
      renderizarArtes();
      document.getElementById("tituloArte").value="";
      document.getElementById("categoriaArte").value="";
      fileInput.value="";
    };
    reader.readAsDataURL(file);
  } else alert("Preencha todos os campos e selecione uma imagem!");
});

/* ====================== interações cards e lightbox ====================== */
function iniciarInteracoes(){
  const cards=document.querySelectorAll(".card");
  const observer=new IntersectionObserver(entries=>{entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add("show");}})});
  cards.forEach(c=>observer.observe(c));

  document.querySelectorAll(".filtros button").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const cat=btn.dataset.categoria;
      document.querySelectorAll(".card").forEach(c=>{
        if(cat=="todos"||c.dataset.categoria==cat){
          c.style.display="block";
          setTimeout(()=>{c.classList.add("show");},50);
        }else{
          c.classList.remove("show");
          setTimeout(()=>{c.style.display="none";},400);
        }
      });
    });
  });

  const imagens=document.querySelectorAll(".card img");
  const lightbox=document.getElementById("lightbox");
  const lightboxImg=document.getElementById("lightbox-img");
  const lightboxTitulo=document.getElementById("lightbox-titulo");
  const loader=document.getElementById("lightbox-loader");
  const next=document.getElementById("next");
  const prev=document.getElementById("prev");
  let index=0;

  function mostrarImagem(){
    const c=imagens[index].closest(".card");
    const novaSrc=imagens[index].src;
    const titulo=c.querySelector("h3").innerText;
    lightboxImg.classList.add("fade-out");
    loader.style.display="block";
    setTimeout(()=>{
      lightboxImg.src=novaSrc;
      lightboxTitulo.innerText=titulo;
      lightboxImg.onload=()=>loader.style.display="none";
      lightboxImg.classList.remove("fade-out");
    },250);
  }

  imagens.forEach((img,i)=>{img.addEventListener("click",()=>{index=i;mostrarImagem();lightbox.classList.add("show");});});
  next.onclick=()=>{index++;if(index>=imagens.length)index=0;mostrarImagem();};
  prev.onclick=()=>{index--;if(index<0)index=imagens.length-1;mostrarImagem();};
  document.getElementById("fecharZoom").onclick=()=>{lightbox.classList.remove("show");};

  document.addEventListener("keydown",(e)=>{
    if(lightbox.classList.contains("show")){
      if(e.key==="ArrowRight") next.onclick();
      if(e.key==="ArrowLeft") prev.onclick();
      if(e.key==="Escape") lightbox.classList.remove("show");
    }
  });

  let touchStartX=0,touchEndX=0;
  lightbox.addEventListener("touchstart",e=>{touchStartX=e.changedTouches[0].screenX;},false);
  lightbox.addEventListener("touchend",e=>{touchEndX=e.changedTouches[0].screenX;handleSwipeGesture();},false);
  function handleSwipeGesture(){
    const swipeDistance=touchEndX-touchStartX;
    const minSwipe=50;
    if(swipeDistance>minSwipe) prev.onclick();
    else if(swipeDistance<-minSwipe) next.onclick();
  }
}

/* ====================== botão voltar funcional ====================== */
document.getElementById("botaoVoltar").addEventListener("click",()=>{
  window.scrollTo({top:0,behavior:"smooth"});
});
</script>

</body>
</html>
