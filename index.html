.botoes{

  border:1px solid #cdb4ff;

  transition:0.3s;
  text-align:center;
  background:#ffffff10;
}

  background:#cdb4ff;
  color:#1a1a22;
  transform:scale(1.04);
}

footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.7;

@media (prefers-color-scheme: light){

  background:#fff1f6;
  color:#8a4b6b;
}

  background:#ffffffcc;
  border:1px solid #ffd6e7;
}

.foto img{
  border:2px solid #ffc8dd;

.code{

  color:#8a4b6b;

.botao{

  color:#8a4b6b;

.botao:hover{

<body>

<div class="container">

<script>
/* Função de texto para terminal */
function obterTexto(){
  const modoClaro = window.matchMedia('(prefers-color-scheme: light)').matches;
  if(modoClaro){
    return `A pintura é poesia que se vê,
e a poesia é pintura que se ouve.`;
  }else{
    return `A maior ameaça para a maioria de nós
não é definir um objetivo alto demais e falhar,
mas definir um objetivo baixo demais
e alcançá-lo.`;
  }
}

function digitar(){
  const terminal = document.getElementById("terminal");
  terminal.innerHTML = "";
  const texto = obterTexto();
  let i = 0;
  function escrever(){
    if(i < texto.length){
      terminal.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escrever,40);
    }
  }
  escrever();
}

digitar();
window.matchMedia('(prefers-color-scheme: light)')
.addEventListener('change', digitar);

/* partículas estilo degradê */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let cores = ["#cdb4ff", "#ffc8dd", "#b5ead7", "#a0c4ff"];

for(let i=0; i<70; i++){
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        cor: cores[Math.floor(Math.random() * cores.length)]
    });
}

function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        let grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r*4);
        grad.addColorStop(0, p.cor + "aa");
        grad.addColorStop(1, p.cor + "00");

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r*4, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();

        p.y += 0.3;
        if(p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
